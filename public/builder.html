<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JDZ Designs — Add Content</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/css/global.css" />
  <link rel="stylesheet" href="/css/builder.css" />
</head>
<body>
  <header class="jdz-header">
    <button class="back-btn" onclick="location.href='/gallery'">← Back</button>
    <div class="brand">JDZ Designs</div>
  </header>

  <main class="builder-page">
    <section class="builder-hero">
      <div class="step-label">STEP 2 — ADD CONTENT</div>
      <h1 class="builder-title">Shape your story.</h1>
      <p class="builder-subtitle">
        Add text, sections, and structure. AI will help you refine everything in the next step.
      </p>
    </section>

    <div class="builder-layout">
      <aside class="builder-sidebar">
        <h3 class="sidebar-title">Content Blocks</h3>
        <button class="block-btn" data-block="hero">Hero Section</button>
        <button class="block-btn" data-block="about">About Section</button>
        <button class="block-btn" data-block="features">Features Grid</button>
        <button class="block-btn" data-block="gallery">Image Gallery</button>
        <button class="block-btn" data-block="cta">Call to Action</button>
        <div class="sidebar-divider"></div>
        <button class="ai-generate-btn">✦ Generate Section with AI</button>
      </aside>

      <section class="builder-editor">
        <div class="editor-header">
          <h3>Content Editor</h3>
          <button class="btn-ghost" id="clear-editor">Clear</button>
        </div>
        <textarea id="editor-input" placeholder="Start writing your content here..."></textarea>
        <div class="editor-actions">
          <button class="btn-primary" id="apply-content">Apply to Preview →</button>
        </div>
      </section>

      <section class="builder-preview">
        <h3 class="preview-title">Live Preview</h3>
        <div class="preview-frame">
          <div id="preview-output" class="preview-output">
            <p class="placeholder-text">Your content will appear here.</p>
          </div>
        </div>
        <a href="/" class="btn-primary continue-btn">Finish for now →</a>
      </section>
    </div>
  </main>

  <footer class="jdz-footer">
    <div class="footer-inner">JDZ Designs • Powered by the JDZ Engine</div>
  </footer>

  <script src="/js/builder.js"></script>
</body>
</html>
