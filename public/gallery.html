<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JDZ Templates — Choose Your Substance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/gallery.css" />
  </head>
  <body>
    <div class="jdz-shell">
      <header class="jdz-nav">
        <div class="jdz-logo">
          <div class="jdz-logo-mark"></div>
          <div class="jdz-logo-text">JDZ DESIGNS</div>
        </div>
        <div class="jdz-nav-right">
          <div class="jdz-pill">Step 1 • Choose Template</div>
          <button class="jdz-secondary-btn" id="backHome">
            <span>Back to Landing</span>
          </button>
        </div>
      </header>

      <main class="jdz-gallery">
        <section class="jdz-gallery-main jdz-panel">
          <div class="jdz-gallery-left">
            <div class="jdz-tag">
              <span class="jdz-tag-dot"></span>
              <span>Template Gallery</span>
            </div>
            <h2>Pick your starting substance.</h2>
            <p class="jdz-gallery-sub">
              Choose a base template. You’ll refine it in the builder with AI‑assisted sections and your own structure.
            </p>

            <div class="jdz-template-grid">
              <button class="jdz-template-card" data-template="gaming">
                <div class="badge">Gaming</div>
                <h3>Neon Arena</h3>
                <p>High‑energy layout for streamers, clans, and esports hubs.</p>
              </button>

              <button class="jdz-template-card" data-template="portfolio">
                <div class="badge">Portfolio</div>
                <h3>Signal Frame</h3>
                <p>Minimal, sharp, and focused on your work and story.</p>
              </button>

              <button class="jdz-template-card" data-template="store">
                <div class="badge">Store</div>
                <h3>Night Market</h3>
                <p>Product‑first layout with bold call‑to‑actions and sections.</p>
              </button>
            </div>
          </div>

          <div class="jdz-gallery-right">
            <div class="jdz-preview-panel">
              <div class="jdz-preview-header">
                <span class="label">Preview</span>
                <span class="status" id="previewStatus">Select a template</span>
              </div>
              <div class="jdz-preview-frame" id="previewFrame">
                <div class="jdz-preview-placeholder">
                  <span>Choose a template to see its structure.</span>
                </div>
              </div>
              <div class="jdz-preview-actions">
                <button class="jdz-primary-btn" id="useTemplateBtn" disabled>
                  <span>Use This Template</span>
                  <span class="icon">⟶</span>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/js/gallery.js"></script>
  </body>
</html>
