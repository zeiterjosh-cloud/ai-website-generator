<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Creator Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Creator Hub</h1>
<p>Generate promotional posts for your Twitch or projects</p>

<button onclick="scrollToGenerator()">Get Started</button>
</header>


<section id="generator">

<h2>Create Your Post</h2>

<textarea id="postInput" placeholder="Write your own post or generate one with AI..."></textarea>

<div class="buttons">

<button onclick="generateAI()">Generate AI Text</button>

<button onclick="createPost()">Create Post</button>

</div>

</section>


<section id="posts">

<h2>Generated Post</h2>

<div id="postPreview"></div>

</section>

<script src="script.js"></script>

</body>
</html>
