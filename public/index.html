<!DOCTYPE html>
<html>

<head>

<title>JDZ Designs</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>JDZ Designs</h1>

<p>Generate Websites From One Sentence</p>

</header>

<section class="generator">

<input id="ideaInput" placeholder="Describe a website idea">

<button onclick="generateWebsite()">Generate Website</button>

</section>

<section class="templates">

<h2>Template Gallery</h2>

<div class="template-grid">

<div class="card" onclick="useTemplate('Gaming Website')">🎮 Gaming</div>

<div class="card" onclick="useTemplate('Business Website')">🏢 Business</div>

<div class="card" onclick="useTemplate('Portfolio Website')">📷 Portfolio</div>

<div class="card" onclick="useTemplate('Startup Landing Page')">🚀 Startup</div>

<div class="card" onclick="useTemplate('Online Store')">🛒 Store</div>

</div>

</section>

<section>

<h2>Generated Website Preview</h2>

<iframe id="preview"></iframe>

</section>

<script src="script.js"></script>

</body>

</html>
