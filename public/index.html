<!DOCTYPE html>
<html>
<head>
<title>AI Website Generator</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:50px;
}

h1{
font-size:48px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.generate{
background:#22c55e;
color:white;
}

.features{
background:#3b82f6;
color:white;
}

textarea{
width:80%;
height:120px;
margin-top:20px;
padding:10px;
border-radius:6px;
border:none;
}

#result{
margin-top:40px;
background:white;
color:black;
padding:20px;
border-radius:10px;
}
</style>

</head>

<body>

<h1>AI Website Generator</h1>

<p>Describe the website you want and AI will generate it.</p>

<textarea id="prompt" placeholder="Example: Create a gaming website with a dark theme"></textarea>

<br>

<button class="generate" onclick="generate()">Generate Website</button>
<button class="features" onclick="features()">Features</button>

<div id="result"></div>

<script>

function generate(){

let prompt = document.getElementById("prompt").value;

if(prompt === ""){
alert("Describe your website first!");
return;
}

document.getElementById("result").innerHTML = `
<h2>Generated Website</h2>
<p><b>Prompt:</b> ${prompt}</p>

<h3>Homepage</h3>
<ul>
<li>Hero section</li>
<li>Navigation menu</li>
<li>Call to action button</li>
</ul>

<h3>Features</h3>
<ul>
<li>Modern UI</li>
<li>Responsive layout</li>
<li>Fast loading</li>
</ul>

<button onclick="download()">Download Website</button>
`;

}

function features(){

alert(
"Features:\\n\\n"+
"AI Website Generation\\n"+
"Responsive Design\\n"+
"Downloadable Templates\\n"+
"Fast Hosting"
);

}

function download(){

alert("Download feature coming soon!");

}

</script>

</body>
</html>
