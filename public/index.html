<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JDZ Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="hero">
  <div class="container">
    <h1 class="hero-title glow">JDZ</h1>
    <p class="hero-tagline">AI Website Generator</p>
    <div class="hero-line"></div>
  </div>
</section>

<div class="divider"></div>

<section>
  <div class="container">

    <h2 style="text-align:center; margin-bottom:20px;">Choose a Template</h2>

    <div class="row">
      <button class="btn" onclick="generateFromTemplate('store')">Online Store</button>
      <button class="btn" onclick="generateFromTemplate('startup')">Startup</button>
      <button class="btn" onclick="generateFromTemplate('portfolio')">Portfolio</button>
      <button class="btn" onclick="generateFromTemplate('business')">Business</button>
      <button class="btn" onclick="generateFromTemplate('gaming')">Gaming</button>
    </div>

    <h2 style="text-align:center; margin-top:50px;">Describe Your Website</h2>

    <div class="row" style="margin-top:10px;">
      <input id="ideaInput" placeholder="Type your idea here..." 
             style="padding:12px 16px; width:260px; border-radius:10px; border:1px solid #333; background:#0a0a12; color:white;">
      <button class="btn" onclick="generateFromIdea()">Generate from Idea</button>
    </div>

  </div>
</section>

<div class="divider"></div>

<section>
  <div class="container">

    <h2 style="text-align:center; margin-bottom:20px;">Live Preview</h2>

    <div class="row" id="preview-tabs">
      <button class="btn" id="tab-index" onclick="switchPreview('index.html')">Home</button>
      <button class="btn" id="tab-about" onclick="switchPreview('about.html')">About</button>
      <button class="btn" id="tab-contact" onclick="switchPreview('contact.html')">Contact</button>
    </div>

    <div id="preview" class="card" style="margin-top:30px; min-height:300px;">
      Site to begin...
    </div>

  </div>
</section>

<div class="divider"></div>

<section>
  <div class="container">
    <h2 style="text-align:center; margin-bottom:20px;">Download Files</h2>

    <div class="row">
      <button class="btn" onclick="downloadFile('index.html')">index.html</button>
      <button class="btn" onclick="downloadFile('about.html')">about.html</button>
      <button class="btn" onclick="downloadFile('contact.html')">contact.html</button>
      <button class="btn" onclick="downloadFile('style.css')">style.css</button>
    </div>
  </div>
</section>

<div class="divider"></div>

<footer>
  <div class="container">
    <div class="footer-title">JDZ</div>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
