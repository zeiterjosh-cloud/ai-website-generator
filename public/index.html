<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JDZ Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <section class="hero">
    <div class="container">
      <h1 class="hero-title glow">JDZ</h1>
      <p class="hero-tagline">AI Website Generator</p>
      <div class="hero-line"></div>
    </div>
  </section>

  <div class="divider-x"></div>

  <main class="main">
    <section class="controls">
      <div class="control-block">
        <h2>Choose a Template</h2>
        <div class="template-list">
          <button class="template-btn" data-template="startup">Startup</button>
          <button class="template-btn" data-template="portfolio">Portfolio</button>
          <button class="template-btn" data-template="business">Business</button>
          <button class="template-btn" data-template="online-store">Online Store</button>
        </div>
      </div>

      <div class="control-block">
        <h2>Generate from Idea</h2>
        <textarea id="idea-input" placeholder="Type your idea here"></textarea>
        <button id="generate-btn">Generate</button>
        <p id="status" class="status"></p>
      </div>
    </section>

    <section class="output">
      <h2>Live Preview</h2>
      <div id="preview" class="preview-area" contenteditable="true">
        <p>Choose a template or generate a site.</p>
      </div>

      <h2 class="editor-title">HTML Editor</h2>
      <textarea id="editor" placeholder="Generated HTML will appear here..."></textarea>
    </section>
  </main>

  <footer class="jdz-footer">
    <span class="jdz-mark">JDZ</span>
  </footer>

  <script src="script.js"></script>
</body>
</html>
