<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Website Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>AI Website Generator</h1>

  <h2>Choose a template</h2>
  <button onclick="generateFromTemplate('store')">Online Store</button>
  <button onclick="generateFromTemplate('startup')">Startup Landing</button>
  <button onclick="generateFromTemplate('portfolio')">Portfolio</button>
  <button onclick="generateFromTemplate('business')">Business Website</button>
  <button onclick="generateFromTemplate('gaming')">Gaming Website</button>

  <h2>Or describe your website</h2>
  <input id="ideaInput" placeholder="Type your idea here">
  <button onclick="generateFromIdea()">Generate from idea</button>

  <h2>Live Preview (index.html)</h2>
  <div id="preview" style="padding:20px; background:#0f172a; color:white; border:1px solid #22d3ee;"></div>

  <h2>Download Files</h2>
  <button onclick="downloadFile('index.html')">Download index.html</button>
  <button onclick="downloadFile('about.html')">Download about.html</button>
  <button onclick="downloadFile('contact.html')">Download contact.html</button>
  <button onclick="downloadFile('style.css')">Download style.css</button>

  <script src="script.js"></script>
</body>
</html>
