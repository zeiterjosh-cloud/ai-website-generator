<!DOCTYPE html>
<html>
<head>
<title>AI Creator Hub</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Creator Hub</h1>
<p>Build websites, marketing pages, and app ideas instantly</p>

<input id="prompt" placeholder="Describe what you want to build">

<br><br>

<select id="type">
<option value="website">Website</option>
<option value="marketing">Marketing Page</option>
<option value="app">App Idea</option>
</select>

<select id="mode">
<option value="ai">AI Generated Text</option>
<option value="custom">Custom Text</option>
</select>

<br><br>

<textarea id="customText" placeholder="Enter your custom text here"></textarea>

<br><br>

<button onclick="generate()">Generate</button>

<hr>

<div id="result"></div>

<script src="script.js"></script>

</body>
</html>
