<!DOCTYPE html>
<html>
<head>
<title>AI Website Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Website Generator</h1>

<p>Describe the website you want</p>

<input id="prompt" placeholder="gaming website">

<br><br>

<textarea id="customText" placeholder="Add your custom text for the website..." rows="4" cols="40"></textarea>

<br><br>

<select id="style">
<option value="modern">Modern</option>
<option value="dark">Dark</option>
<option value="colorful">Colorful</option>
</select>

<br><br>

<button onclick="generateWebsite()">Generate Website</button>

<hr>

<div id="preview"></div>

<script src="script.js"></script>

</body>
</html>
