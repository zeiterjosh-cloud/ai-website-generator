<!DOCTYPE html>
<html>
<head>
<title>AI Website Generator</title>

<style>
body{
font-family: Arial;
background:#020617;
color:white;
text-align:center;
padding:50px;
}

input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
}

button{
padding:12px 20px;
background:#6366f1;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

iframe{
width:100%;
height:500px;
margin-top:30px;
border:none;
}
</style>

</head>

<body>

<h1>AI Website Generator</h1>

<p>Describe the website you want</p>

<input id="prompt" placeholder="gaming website">
<button onclick="generate()">Generate</button>

<iframe id="preview"></iframe>

<script>

async function generate(){

const prompt = document.getElementById("prompt").value;

const res = await fetch("/generate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({prompt})
});

const data = await res.json();

document.getElementById("preview").srcdoc = data.html;

}

</script>

</body>
</html>
