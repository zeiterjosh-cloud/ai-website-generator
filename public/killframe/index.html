<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILLFRAME - Tactical Elimination Protocol</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
        }
        
        #game-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        
        /* Loading screen */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loading-title {
            font-size: 48px;
            font-weight: 900;
            color: #ff00ff;
            text-shadow: 0 0 30px #ff00ff;
            letter-spacing: 10px;
            margin-bottom: 40px;
        }
        
        .loading-bar-container {
            width: 300px;
            height: 4px;
            background: rgba(255, 0, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .loading-bar {
            height: 100%;
            width: 0%;
            background: #ff00ff;
            box-shadow: 0 0 10px #ff00ff;
            animation: loading 2s ease-in-out infinite;
        }
        
        @keyframes loading {
            0% { width: 0%; }
            50% { width: 100%; }
            100% { width: 0%; }
        }
        
        .loading-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading-screen">
        <div class="loading-title">KILLFRAME</div>
        <div class="loading-bar-container">
            <div class="loading-bar"></div>
        </div>
        <div class="loading-text">INITIALIZING COMBAT SYSTEMS</div>
    </div>
    
    <!-- Game Container -->
    <div id="game-container"></div>
    
    <!-- Import Three.js and game modules -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    
    <script type="module">
        // Hide loading screen when game is ready
        import('./js/main.js').then(() => {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 1500);
        }).catch(err => {
            console.error('Failed to load game:', err);
            document.querySelector('.loading-text').textContent = 'SYSTEM ERROR: RELOAD REQUIRED';
            document.querySelector('.loading-text').style.color = '#ff0000';
        });
    </script>
</body>
</html>
